openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: SprintForge PRD → Sprint Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prds
    description: PRD and task operations
  - name: admin
    description: Admin operations (require auth)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /prds:
    get:
      operationId: listPrds
      tags: [prds]
      summary: List all PRDs (lightweight)
      responses:
        "200":
          description: List of PRDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrdSummary"
    post:
      operationId: createPrd
      tags: [prds]
      summary: Generate PRD and tasks via GPT-4o
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrdInput"
      responses:
        "201":
          description: PRD created with tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrdDetail"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /prds/{id}:
    get:
      operationId: getPrd
      tags: [prds]
      summary: Get full PRD detail with tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PRD with tasks ordered by sprint_number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrdDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin statistics (requires auth)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/prds:
    get:
      operationId: getAdminPrds
      tags: [admin]
      summary: Get all PRDs with full stats for admin table (requires auth)
      security:
        - bearerAuth: []
      parameters:
        - name: urgency
          in: query
          required: false
          schema:
            type: string
        - name: complexity
          in: query
          required: false
          schema:
            type: string
        - name: priorityLabel
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: PRD admin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPrdRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sprint-config:
    get:
      operationId: getSprintConfig
      tags: [admin]
      summary: Get sprint configuration (requires auth)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sprint configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SprintConfig"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSprintConfig
      tags: [admin]
      summary: Update sprint configuration (requires auth)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SprintConfigUpdate"
      responses:
        "200":
          description: Updated sprint configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SprintConfig"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logs:
    get:
      operationId: getAdminLogs
      tags: [admin]
      summary: Get recent admin logs (requires auth)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent admin log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminLog"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PrdInput:
      type: object
      required: [featureIdea]
      properties:
        featureIdea:
          type: string
          minLength: 1
        targetUser:
          type: string
        businessGoal:
          type: string
        deadline:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
        complexity:
          type: string
          enum: [low, medium, high]
        additionalConstraints:
          type: string

    UserStory:
      type: object
      required: [role, action, benefit]
      properties:
        role:
          type: string
        action:
          type: string
        benefit:
          type: string

    Task:
      type: object
      required: [id, prdId, taskName, description, category, effortPoints, priorityScore, riskLevel, dependencies, sprintNumber, createdAt]
      properties:
        id:
          type: integer
        prdId:
          type: integer
        taskName:
          type: string
        description:
          type: string
        category:
          type: string
        effortPoints:
          type: integer
        priorityScore:
          type: number
        riskLevel:
          type: string
        dependencies:
          type: array
          items:
            type: integer
        sprintNumber:
          type: integer
        createdAt:
          type: string

    PrdSummary:
      type: object
      required: [id, title, featureIdea, status, createdAt, urgency, complexity, targetUser, avgPriorityScore, avgEffortPoints, sprintCount]
      properties:
        id:
          type: integer
        title:
          type: string
        featureIdea:
          type: string
        targetUser:
          type: string
        urgency:
          type: string
        complexity:
          type: string
        status:
          type: string
        createdAt:
          type: string
        avgPriorityScore:
          type: number
        avgEffortPoints:
          type: number
        sprintCount:
          type: integer

    PrdDetail:
      type: object
      required: [id, title, featureIdea, targetUser, businessGoal, deadline, urgency, complexity, additionalConstraints, problemStatement, goals, userStories, status, createdAt, tasks]
      properties:
        id:
          type: integer
        title:
          type: string
        featureIdea:
          type: string
        targetUser:
          type: string
        businessGoal:
          type: string
        deadline:
          type: string
        urgency:
          type: string
        complexity:
          type: string
        additionalConstraints:
          type: string
        problemStatement:
          type: string
        goals:
          type: string
        userStories:
          type: array
          items:
            $ref: "#/components/schemas/UserStory"
        status:
          type: string
        createdAt:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [token]
      properties:
        token:
          type: string

    SprintConfig:
      type: object
      required: [id, sprintLengthDays, velocityPoints, updatedAt]
      properties:
        id:
          type: integer
        sprintLengthDays:
          type: integer
        velocityPoints:
          type: integer
        updatedAt:
          type: string

    SprintConfigUpdate:
      type: object
      properties:
        sprintLengthDays:
          type: integer
          minimum: 1
        velocityPoints:
          type: integer
          minimum: 1

    SprintTaskCount:
      type: object
      required: [sprintNumber, taskCount]
      properties:
        sprintNumber:
          type: integer
        taskCount:
          type: integer

    RiskCount:
      type: object
      required: [riskLevel, count]
      properties:
        riskLevel:
          type: string
        count:
          type: integer

    AdminStats:
      type: object
      required: [totalPrds, totalTasks, tasksByRisk, tasksBySprint, highPriorityCount, avgPriorityScore, avgEffortScore, avgSprintCount, mostRecentDate]
      properties:
        totalPrds:
          type: integer
        totalTasks:
          type: integer
        highPriorityCount:
          type: integer
        avgPriorityScore:
          type: number
        avgEffortScore:
          type: number
        avgSprintCount:
          type: number
        mostRecentDate:
          type: ["string", "null"]
        tasksByRisk:
          type: array
          items:
            $ref: "#/components/schemas/RiskCount"
        tasksBySprint:
          type: array
          items:
            $ref: "#/components/schemas/SprintTaskCount"

    AdminPrdRow:
      type: object
      required: [id, title, targetUser, urgency, complexity, priorityLabel, avgPriorityScore, avgEffortScore, sprintCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        targetUser:
          type: string
        urgency:
          type: string
        complexity:
          type: string
        priorityLabel:
          type: string
        avgPriorityScore:
          type: number
        avgEffortScore:
          type: number
        sprintCount:
          type: integer
        createdAt:
          type: string

    AdminLog:
      type: object
      required: [id, eventType, details, timestamp]
      properties:
        id:
          type: integer
        eventType:
          type: string
        prdId:
          type: ["integer", "null"]
        details:
          type: string
        ipAddress:
          type: ["string", "null"]
        userAgent:
          type: ["string", "null"]
        timestamp:
          type: string
